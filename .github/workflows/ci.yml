name: CI — Lint, Test & Security

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install flake8 black isort --quiet

      - name: flake8 — style & syntax
        run: |
          flake8 src/ tests/ app.py \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --exclude=__pycache__,.venv

      - name: black — formatting check
        run: black --check --diff src/ tests/ app.py

      - name: isort — import order check
        run: isort --check-only --diff src/ tests/ app.py

  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src/rag_assistant \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install bandit
        run: pip install bandit --quiet

      - name: Run bandit security scan
        run: |
          bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            --skip B101 \
            -f txt || true   # advisory only — won't block merge

  # ─────────────────────────────────────────────────────────────────────────
  docker-build-check:
    name: "Docker Build Validation"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: advanced-rag:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
