paths:
  data_dir: "dataset/medical/"
  vector_store_dir: "vector_store/"

embedding:
  provider: "huggingface"           # or "openai"
  model_name: "BAAI/bge-small-en-v1.5"
  # For OpenAI:
  # provider: "openai"
  # model_name: "text-embedding-3-small"
  device: "cpu"
  normalize_embeddings: true

llm:
  provider: "ollama"
  model_name: "gemma4:e4b"
  temperature: 0.2
  max_tokens: 1024
  # For Ollama:
  model_base_url: "http://localhost:11434"
  # For OpenAI:
  # provider: "openai"
  # model_name: "gpt-4o"

vector_store:
  type: "ChromaClient"
  chroma_server_url: "http://localhost:8001"
  collection_name: "medical_rag"

retrieval:
  dense_top_k: 10       # broad initial retrieval — always top_k
  sparse_top_k: 10      # broad initial retrieval — always top_k
  final_top_k: 5        # fallback when top_p is not set
  # top_p: 0.85         # nucleus threshold for RRF output (uncomment to enable)
  enable_query_rewriting: true
  enable_reranking: true

reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n: 5              # fallback when top_p is not set
  # top_p: 0.90         # nucleus threshold over softmax of reranker scores (uncomment to enable)

ingestion:
  chunk_size: 512
  chunk_overlap: 64
  supported_extensions: [".txt", ".pdf", ".md", ".csv"]
  chunking_strategy: "recursive"    # or "semantic"

evaluation:
  test_data_path: "dataset/eval_samples.json"
  metrics: ["faithfulness", "answer_relevancy", "context_precision"]
  output_path: "evaluation_results.json"

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
